name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt && pip install -e .
      - name: Unit tests
        run: pytest -q

  eval-gate:
    # Example of RegressLM guarding a real PR: run evals, fail if quality regressed.
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt && pip install -e .
      - name: Establish baseline (v1)
        run: |
          regresslm run --dataset examples/datasets/support_triage.yaml \
            --target examples.targets:triage_v1 --scorers label_match --model v1 --run-id base
          regresslm baseline support_triage base
      - name: Evaluate candidate & gate
        run: |
          regresslm run --dataset examples/datasets/support_triage.yaml \
            --target examples.targets:triage_v1 --scorers label_match --model v1 --run-id candidate
          regresslm gate --dataset support_triage --candidate candidate
